[project]
root = "."

[languages]
rust       = { grammar = "tree-sitter-rust",       enabled = true }
typescript = { grammar = "tree-sitter-typescript", enabled = true }
python     = { grammar = "tree-sitter-python",     enabled = true }

# Mapeados — arquivos aqui são analisados e devem ter layer
[layers]
L0  = "00_nucleo"
L1  = "01_core"
L2  = "02_shell"
L3  = "03_infra"
L4  = "04_wiring"
lab = "lab"

# Excluídos — ignorados intencionalmente, não disparam V8 (ADR-0006)
[excluded]
build    = "target"
deps     = "node_modules"
vcs      = ".git"
cargo    = ".cargo"
lib_root = "lib.rs"

# Rust module name → layer (used by LayerResolver for crate:: imports)
[module_layers]
entities  = "L1"
contracts = "L1"
rules     = "L1"
shell     = "L2"
infra     = "L3"

# Portas públicas de L1 — únicos subdiretórios acessíveis de L2/L3
# Imports de outros subdiretórios de L1 disparam V9 (ADR-0006)
[l1_ports]
entities  = "entities"
contracts = "contracts"
rules     = "rules"

# Prompts que existem legitimamente sem materialização Rust (ADR-0006)
[orphan_exceptions]
"00_nucleo/prompts/cargo.md"                   = "gera Cargo.toml, não arquivo Rust"
"00_nucleo/prompts/readme_prompt.md"           = "gera README.md, não arquivo Rust"
"00_nucleo/prompts/parsers/_template.md"       = "contrato editorial, não materializa directamente"

# Exceções V12 — declarações permitidas em L4
# true = permite struct_item em L4 (padrão — adapter structs são comuns)
# enum_item e impl_item sem trait são sempre proibidos
[wiring_exceptions]
allow_adapter_structs = true

# TypeScript path aliases — opcional (apenas para projectos com tsconfig.json paths)
# [ts_aliases]
# "@core"  = "01_core"
# "@shell" = "02_shell"
# "@infra" = "03_infra"

# Python package aliases — opcional (mapeia package name → layer dir)
# [py_aliases]
# "core"  = "01_core"
# "shell" = "02_shell"
# "infra" = "03_infra"

[rules]
V0  = { level = "fatal" }
V1  = { level = "error" }
V2  = { level = "error" }
V3  = { level = "error" }
V4  = { level = "error" }
V5  = { level = "warning" }
V6  = { level = "warning" }
V7  = { level = "warning" }
V8  = { level = "fatal" }
V9  = { level = "error" }
V10 = { level = "fatal" }
V11 = { level = "error" }
V12 = { level = "warning" }
